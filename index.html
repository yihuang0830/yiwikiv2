  <script> //判断页面滚动进度
    var pageNumber = document.querySelector(".page-number");
    var timer;
    window.addEventListener("scroll", function () {
      clearTimeout(timer);
      pageNumber.style.display = "inline";
      var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
      var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      var percentage = Math.round(scrollTop / docHeight * 100);
      pageNumber.textContent = percentage + "%";
      timer = setTimeout(function () {
        pageNumber.style.display = "none";
      }, 3000);
    });
  </script>

    <script> // 点击复制邮箱，右下角提示
      function copyEmail(email) {
        const showToast = () => {
          const toast = document.getElementById('toast');
          toast.classList.add('show');
          clearTimeout(window._toastTimer);
          window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(email).then(showToast).catch(fallbackCopy);
        } else {
          fallbackCopy();
        }
        function fallbackCopy() {
          const ta = document.createElement('textarea');
          ta.value = email;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch (e) {}
          document.body.removeChild(ta);
          showToast();
        }
      }
    </script>

    <div id="threejs-cross"></div>
    <script type="module">
      import * as THREE from 'three';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

      if (window.matchMedia("(min-aspect-ratio: 1)").matches) {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(500, 500);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        const container = document.getElementById('threejs-cross');
        container.appendChild(renderer.domElement);

        // 灯光
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(5, 10, 7.5);
        scene.add(light);

        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);

        // 用 pivot 让模型绕自身中心旋转
        const pivot = new THREE.Group();
        scene.add(pivot);
        let model;

        // 加载 GLB 模型（自带颜色和材质）
        const loader = new GLTFLoader();
        loader.load('resource/cute_cat.glb', function (gltf) {
          model = gltf.scene;

          // 自动居中 + 缩放到合适大小
          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          model.position.sub(center);            // 把几何中心移到原点
          pivot.add(model);
          pivot.scale.setScalar(14 / maxDim);    // 缩放填满视野

          model = pivot;                          // 旋转 pivot
        });

        // 交互逻辑
        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;
        let autoRotate = true;

        const onPointerDown = (event) => {
          isDragging = true;
          autoRotate = false;
          previousMouseX = event.clientX || (event.touches && event.touches[0].clientX);
          previousMouseY = event.clientY || (event.touches && event.touches[0].clientY);
        };

        const onPointerMove = (event) => {
          if (!isDragging || !model) return;

          if (event.cancelable) event.preventDefault();

          const currentX = event.clientX || (event.touches && event.touches[0].clientX);
          const currentY = event.clientY || (event.touches && event.touches[0].clientY);

          const deltaX = currentX - previousMouseX;
          const deltaY = currentY - previousMouseY;

          model.rotation.y += deltaX * 0.01;
          model.rotation.x += deltaY * 0.01;

          previousMouseX = currentX;
          previousMouseY = currentY;
        };

        const onPointerUp = () => {
          isDragging = false;
          setTimeout(() => {
            if (!isDragging) autoRotate = true;
          }, 1000);
        };

        container.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);

        container.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        window.addEventListener('touchend', onPointerUp);

        function animate() {
          requestAnimationFrame(animate);
          if (model && autoRotate) {
            model.rotation.y += 0.005;
          }
          renderer.render(scene, camera);
        }
        animate();
      }
    </script>
